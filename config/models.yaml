models:
  nesty-flash-1.0:
    display_name: "Nesty Flash 1.0"
    description: "Fastest lightweight profile for short and quick responses"
    strategy: "speed"
    search_mode: "auto"
    behavior_profile: "flash"
    response_style: "concise"
    reasoning_depth: "low"
    search_aggressiveness: "low"
    tool_aggressiveness: "low"
    default_temperature: 0.6
    default_max_tokens: 1024
    orchestration_enabled: false
    orchestration_mode: "single"
    tools_mode: "auto"
    max_tool_calls: 1
    allowed_tools:
      - "calculator"
      - "package_version_lookup"
    max_search_results: 3
    max_context_chars: 2000
    provider_chain:
      - provider: "groq"
        model: "llama-3.1-8b-instant"
      - provider: "openrouter"
        model: "qwen/qwen3-14b:free"

  nesty-combined-1.0:
    display_name: "Nesty Combined 1.0"
    description: "Balanced multi-provider model profile"
    strategy: "balanced"
    search_mode: "auto"
    behavior_profile: "balanced"
    response_style: "balanced"
    reasoning_depth: "medium"
    search_aggressiveness: "auto"
    tool_aggressiveness: "auto"
    default_temperature: 0.7
    default_max_tokens: 2048
    orchestration_enabled: false
    orchestration_mode: "single"
    tools_mode: "auto"
    max_tool_calls: 3
    allowed_tools:
      - "calculator"
      - "wikipedia_lookup"
      - "package_version_lookup"
      - "weather_lookup"
      - "exchange_rate"
    max_search_results: 5
    max_context_chars: 6000
    provider_chain:
      - provider: "groq"
        model: "llama-3.3-70b-versatile"
      - provider: "openrouter"
        model: "qwen/qwen3-32b:free"
      - provider: "nvidia"
        model: "default"

  nesty-pro-1.0:
    display_name: "Nesty Pro 1.0"
    description: "Highest-quality profile with optional multi-model synthesis for non-streaming"
    strategy: "quality"
    search_mode: "auto"
    behavior_profile: "pro"
    response_style: "detailed"
    reasoning_depth: "high"
    search_aggressiveness: "high_when_needed"
    tool_aggressiveness: "high_when_needed"
    default_temperature: 0.5
    default_max_tokens: 4096
    orchestration_enabled: true
    orchestration_mode: "multi_model_synthesis"
    tools_mode: "auto"
    max_tool_calls: 6
    allowed_tools:
      - "calculator"
      - "wikipedia_lookup"
      - "package_version_lookup"
      - "weather_lookup"
      - "exchange_rate"
    max_search_results: 8
    max_context_chars: 12000
    provider_chain:
      - provider: "openrouter"
        model: "deepseek/deepseek-r1:free"
      - provider: "nvidia"
        model: "deepseek-ai/deepseek-r1"
      - provider: "groq"
        model: "llama-3.3-70b-versatile"
    orchestration_roles:
      planner:
        provider_chain:
          - provider: "groq"
            model: "llama-3.1-8b-instant"
      researcher:
        provider_chain:
          - provider: "openrouter"
            model: "deepseek/deepseek-r1:free"
          - provider: "groq"
            model: "llama-3.3-70b-versatile"
      critic:
        provider_chain:
          - provider: "groq"
            model: "llama-3.3-70b-versatile"
      finalizer:
        provider_chain:
          - provider: "openrouter"
            model: "deepseek/deepseek-r1:free"
          - provider: "groq"
            model: "llama-3.3-70b-versatile"
